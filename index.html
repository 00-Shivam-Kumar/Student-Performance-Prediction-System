<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Student Performance Predictor</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>
<body>

<div class="sidebar">

    <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <h2>AI STUDENT</h2>
        <span>PREDICTOR</span>
    </div>

    <ul>
        <li class="active"><i class="fas fa-home"></i> Home</li>
        <li><i class="fas fa-chart-line"></i> Predict</li>
        <li><i class="fas fa-history"></i> History</li>
        <li><i class="fas fa-info-circle"></i> About</li>
    </ul>

</div>

<div class="main-content">

    <div class="hero">

        <div class="left">

            <h1>
                AI Student<br>
                Performance Predictor
            </h1>

            <p>
                Get accurate performance prediction using
                Machine Learning
            </p>

        </div>

        <div class="right">
            <img src="{{ url_for('static', filename='robot.png') }}">
        </div>

    </div>

    <div class="form-card">

        <h2>Enter Student Details</h2>

        <form action="/predict" method="POST">

            <input type="number"
                   name="attendance"
                   placeholder="Attendance (%)"
                   required>

            <input type="number"
                   step="0.1"
                   name="study_hours"
                   placeholder="Study Hours Per Day"
                   required>

            <input type="number"
                   name="internal_marks"
                   placeholder="Internal Marks"
                   required>

            <input type="number"
                   name="previous_marks"
                   placeholder="Previous Marks"
                   required>

            <input type="number"
                   name="assignments"
                   placeholder="Assignments Completed"
                   required>

            <button type="submit">
                <i class="fas fa-rocket"></i>
                Predict Performance
            </button>

        </form>

    </div>

</div>

</body>
</html>
